<div class="min-h-screen bg-slate-50 flex">
  <!-- Mobile Sidebar Overlay -->
  <div 
    *ngIf="sidebarOpen" 
    (click)="toggleSidebar()" 
    class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 lg:hidden"
  ></div>

  <!-- Sidebar -->
  <aside 
    [class.translate-x-0]="sidebarOpen" 
    [class.-translate-x-full]="!sidebarOpen" 
    [class.lg:w-72]="sidebarOpen" 
    [class.lg:w-20]="!sidebarOpen" 
    class="bg-secondary-900 text-white transition-all duration-300 flex flex-col absolute lg:relative inset-y-0 left-0 z-50 lg:translate-x-0 w-64 lg:w-auto"
  >
    <div class="p-6 flex items-center gap-3">
      <div class="w-10 h-10 bg-primary-600 rounded-xl flex items-center justify-center shadow-lg shadow-primary-500/20">
        <lucide-angular [img]="icons.Wrench" class="w-6 h-6 text-white"></lucide-angular>
      </div>
      <h1 *ngIf="sidebarOpen" class="font-bold text-lg tracking-tight overflow-hidden whitespace-nowrap">Servicios Mecánicos App</h1>
    </div>

    <nav class="flex-1 px-4 py-4 space-y-2">
      <a 
        *ngFor="let item of navItems" 
        [routerLink]="item.route" 
        routerLinkActive="sidebar-item-active"
        (click)="closeSidebarOnMobile()"
        class="flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 text-slate-400 hover:text-white hover:bg-secondary-800 group"
      >
        <lucide-angular [img]="item.icon" class="w-5 h-5 transition-transform group-hover:scale-110"></lucide-angular>
        <span *ngIf="sidebarOpen" class="font-medium whitespace-nowrap">{{ item.label }}</span>
      </a>
    </nav>

    <div class="p-6 border-t border-secondary-800 space-y-4">
      <div class="flex items-center gap-3">
        <lucide-angular [img]="icons.UserCircle" class="w-10 h-10 text-slate-400"></lucide-angular>
        <div *ngIf="sidebarOpen" class="overflow-hidden">
          <p class="text-sm font-semibold truncate">Admin User</p>
          <p class="text-xs text-slate-500 truncate">autolavado.paco98&#64;gmail.com</p>
        </div>
      </div>
      <button 
        (click)="logout()"
        class="w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 text-red-400 hover:text-white hover:bg-red-500/20 group"
      >
        <lucide-angular [img]="icons.LogOut" class="w-5 h-5"></lucide-angular>
        <span *ngIf="sidebarOpen" class="font-medium whitespace-nowrap">Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col h-screen overflow-hidden">
    <!-- Topbar -->
    <header class="h-20 bg-white border-b border-slate-100 flex items-center justify-between px-8 shrink-0">
      <div class="flex items-center gap-4">
        <button (click)="toggleSidebar()" class="p-2 hover:bg-slate-50 rounded-lg text-slate-500">
          <lucide-angular [img]="sidebarOpen ? icons.X : icons.Menu" class="w-6 h-6"></lucide-angular>
        </button>
        </button>
      </div>

      <div class="flex items-center gap-4">
        <div class="h-8 w-[1px] bg-slate-100 mx-2"></div>
        <div class="flex items-center gap-3">
          <div class="text-right hidden sm:block">
            <p class="text-sm font-bold">Admin User</p>
            <p class="text-xs text-slate-400">Super Admin</p>
          </div>
          <div class="w-10 h-10 bg-gradient-to-tr from-primary-600 to-primary-400 rounded-xl shadow-lg shadow-primary-500/20"></div>
        </div>
      </div>
    </header>

    <!-- Content Area -->
    <div class="flex-1 overflow-y-auto p-8">
      <router-outlet></router-outlet>
    </div>
  </main>
  <app-notification></app-notification>
</div>
